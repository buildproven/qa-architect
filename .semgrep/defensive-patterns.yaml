rules:
  # =============================================================================
  # Defensive Patterns Semgrep Rules (CS-090)
  # =============================================================================
  # Security-focused rules that complement ESLint defensive patterns.
  # Run with: semgrep --config .semgrep/defensive-patterns.yaml
  #
  # These rules catch patterns that are difficult or impossible to detect
  # with ESLint alone.
  # =============================================================================

  # ---------------------------------------------------------------------------
  # PROTOTYPE POLLUTION
  # ---------------------------------------------------------------------------
  - id: prototype-pollution-json-parse
    message: |
      JSON.parse on user input can lead to prototype pollution if the parsed
      object has __proto__ properties. Use a safe parse function that strips
      dangerous properties.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: JSON.parse($REQ.body)
      - pattern: JSON.parse($REQ.query.$PARAM)
      - pattern: JSON.parse($REQ.params.$PARAM)
      - pattern: JSON.parse(await $REQ.json())
    metadata:
      category: security
      cwe: 'CWE-1321'
      owasp: 'A03:2021'
      references:
        - https://portswigger.net/web-security/prototype-pollution

  - id: prototype-pollution-object-assign
    message: |
      Object.assign with user-controlled input can lead to prototype pollution.
      Sanitize input or use a safer merge function.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: Object.assign($OBJ, $REQ.body)
      - pattern: Object.assign($OBJ, ...$USER_INPUT)
    metadata:
      category: security
      cwe: 'CWE-1321'

  - id: prototype-pollution-spread
    message: |
      Spreading user input directly into an object can lead to prototype
      pollution. Validate keys before spreading.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern: '{ ...$REQ.body }'
    metadata:
      category: security
      cwe: 'CWE-1321'

  # ---------------------------------------------------------------------------
  # SQL INJECTION
  # ---------------------------------------------------------------------------
  - id: sql-injection-template-string
    message: |
      SQL query built with template string containing user input. Use
      parameterized queries instead.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: $DB.query(`...${$USER_INPUT}...`)
      - pattern: $DB.raw(`...${$USER_INPUT}...`)
      - pattern: $PRISMA.$queryRaw(`...${$USER_INPUT}...`)
    metadata:
      category: security
      cwe: 'CWE-89'
      owasp: 'A03:2021'

  - id: sql-injection-string-concat
    message: |
      SQL query built with string concatenation. Use parameterized queries.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: $DB.query("..." + $USER_INPUT + "...")
    metadata:
      category: security
      cwe: 'CWE-89'

  # ---------------------------------------------------------------------------
  # AUTHENTICATION BYPASS
  # ---------------------------------------------------------------------------
  - id: auth-bypass-or-condition
    message: |
      OR condition in authentication check may allow bypass. Use AND conditions
      for security checks.
    severity: WARNING
    languages:
      - javascript
      - typescript
    # Only flag OR conditions where an operand actually names an auth concept.
    # The unguarded form matched every `if (a || b)` in the codebase — e.g.
    # `if (stepName.includes('test') || stepName.includes('e2e'))`.
    #
    # A bypass is the same vulnerability regardless of operand order:
    # `if (isAuthenticated || debugMode) grant()` and
    # `if (debugMode || isAuthenticated) grant()` are equivalent, so BOTH
    # positions are flagged.
    #
    # This is a WARNING-level HEURISTIC, not a precise detector — semgrep OSS
    # patterns cannot do the dataflow needed to prove whether the body grants
    # or denies access. The bias is therefore toward RECALL: a real OR-bypass
    # must not be silently dropped, even at the cost of occasional noise.
    # Concretely, these all still FIRE (they are real or plausible bypasses):
    #   - `if (isAuthenticated || debugMode) grant()`     (positive predicate)
    #   - `if (debugMode || isAuthenticated) grant()`     (commuted)
    #   - `if (req.user.role === requiredRole || debugMode) grant()` (RBAC)
    #   - `if (token === expectedToken || bypass) allow()`
    #   - `if (!isAuthenticated || debugMode) grantAccess()` (negated-grant —
    #     a body that grants on missing auth IS a bypass; we do NOT blanket-
    #     suppress negated operands, since we cannot verify the body denies)
    #   - `if (x || roles.includes('admin')) grant()`     (authz membership)
    #
    # The ONLY thing excluded is the narrow, unambiguous ERROR-CLASSIFICATION
    # shape, where the auth-name regex matches a string LITERAL inside an
    # error-property comparison/search rather than an access predicate:
    #   - `$ERR.message|code|name === "..."`   (error equality classification)
    #   - `$ERR.message|code|name|stack.includes(...)` (error substring search)
    #   - a nested `a || b || c` subtree bound as the operand
    # Narrowing the exclusion to error properties (not all equality/negation)
    # is deliberate: a blanket equality exclusion would drop RBAC checks like
    # `role === requiredRole`, and a blanket negated-operand exclusion would
    # drop `!isAuthenticated || debug { grant }`. The single bare-variable
    # `message.includes('permission')` classifier in lib/error-reporter.js that
    # this heuristic cannot distinguish carries an inline `nosemgrep`.
    pattern-either:
      # Positive auth assertion as the LEFT operand.
      - patterns:
          - pattern-either:
              - pattern: if ($AUTH || $OTHER) { ... }
              - pattern: |
                  $AUTH || $OTHER ? $TRUE : $FALSE
          - metavariable-regex:
              metavariable: $AUTH
              regex: '(?i).*(auth|isadmin|issuperuser|session|token|role|permission|loggedin|authenticated|authorized|credential).*'
          - metavariable-pattern:
              metavariable: $AUTH
              patterns:
                - pattern-not: $L || $R
                - pattern-not: $E.message === "..."
                - pattern-not: $E.code === "..."
                - pattern-not: $E.name === "..."
                - pattern-not: $E.message.includes(...)
                - pattern-not: $E.code.includes(...)
                - pattern-not: $E.name.includes(...)
                - pattern-not: $E.stack.includes(...)
      # Positive auth assertion as the RIGHT operand (commuted bypass).
      - patterns:
          - pattern-either:
              - pattern: if ($OTHER || $AUTH) { ... }
              - pattern: |
                  $OTHER || $AUTH ? $TRUE : $FALSE
          - metavariable-regex:
              metavariable: $AUTH
              regex: '(?i).*(auth|isadmin|issuperuser|session|token|role|permission|loggedin|authenticated|authorized|credential).*'
          - metavariable-pattern:
              metavariable: $AUTH
              patterns:
                - pattern-not: $L || $R
                - pattern-not: $E.message === "..."
                - pattern-not: $E.code === "..."
                - pattern-not: $E.name === "..."
                - pattern-not: $E.message.includes(...)
                - pattern-not: $E.code.includes(...)
                - pattern-not: $E.name.includes(...)
                - pattern-not: $E.stack.includes(...)
    metadata:
      category: security
      cwe: 'CWE-287'

  - id: auth-skip-on-dev
    message: |
      Authentication skipped in development mode. This pattern can accidentally
      reach production. Use environment-specific auth instead.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: |
          if (process.env.NODE_ENV !== "production") {
            return $ALLOW;
          }
    metadata:
      category: security
      cwe: 'CWE-287'

  # ---------------------------------------------------------------------------
  # INSECURE RANDOMNESS
  # ---------------------------------------------------------------------------
  - id: insecure-random-token
    message: |
      Math.random() is not cryptographically secure. Use crypto.randomBytes()
      or crypto.randomUUID() for tokens, IDs, and secrets.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: Math.random().toString($BASE)
      - pattern: Math.random().toString($BASE).slice($N)
      - pattern: Math.random().toString($BASE).substring($N)
    metadata:
      category: security
      cwe: 'CWE-330'
      fix: "Use crypto.randomBytes(32).toString('hex') or crypto.randomUUID()"

  - id: insecure-random-array
    message: |
      Using Math.random() for shuffling or selection in security-sensitive
      context. Use crypto.getRandomValues() instead.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern: Math.floor(Math.random() * $ARR.length)
    metadata:
      category: security
      cwe: 'CWE-330'

  # ---------------------------------------------------------------------------
  # COMMAND INJECTION
  # ---------------------------------------------------------------------------
  # Note: These rules detect DANGEROUS patterns that should be flagged.
  # The patterns below are what we want to WARN about, not examples to follow.

  - id: command-injection-template
    message: |
      User input in shell command template string. Use child_process.execFile
      with argument array or validate/escape input.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: child_process.execSync(`...${$USER_INPUT}...`)
    metadata:
      category: security
      cwe: 'CWE-78'
      owasp: 'A03:2021'
      fix: 'Use execFile() with argument array instead of template strings'

  - id: command-injection-shell-option
    message: |
      spawn() with shell: true can lead to command injection. Use shell: false
      and pass arguments as array.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern: 'spawn($CMD, $ARGS, { ..., shell: true, ... })'
    metadata:
      category: security
      cwe: 'CWE-78'

  # ---------------------------------------------------------------------------
  # PATH TRAVERSAL
  # ---------------------------------------------------------------------------
  - id: path-traversal-join
    message: |
      User input in path.join() without validation can lead to path traversal.
      Validate that the result stays within intended directory.
    severity: WARNING
    languages:
      - javascript
      - typescript
    # Only flag joins fed by request data. The bare path.join($BASE, $X)
    # form matched every internal join (path.join(dir, 'package.json')) and
    # produced almost all of this rule's false positives — removed.
    #
    # Both INLINE (`path.join(base, req.params.x)`) and ALIASED
    # (`const f = req.params.x; path.join(base, f)`, including destructuring)
    # request-data shapes are covered: the aliased arms use `pattern-inside`
    # to require the joined metavariable to originate from req.params/query/body
    # in the surrounding scope. Dropping the aliased form would silently miss
    # the most common real-world traversal pattern.
    pattern-either:
      # Inline member-expression arguments. The vararg forms use $REQ (not a
      # literal `req`) so a request object named `request`/`ctx`/etc. and joins
      # with 3+ segments (path.join(base, 'uploads', request.params.file)) are
      # still caught — detection must not hinge on the local variable name.
      - pattern: path.join($BASE, $REQ.params.$PARAM)
      - pattern: path.join($BASE, $REQ.query.$PARAM)
      - pattern: path.join($BASE, $REQ.body.$PARAM)
      - pattern: path.join(..., $REQ.params.$PARAM, ...)
      - pattern: path.join(..., $REQ.query.$PARAM, ...)
      - pattern: path.join(..., $REQ.body.$PARAM, ...)
      # Aliased via direct assignment: const f = req.params.x; path.join(base, f)
      - patterns:
          - pattern: path.join(..., $ALIAS, ...)
          - pattern-inside: |
              $ALIAS = $REQ.params.$PARAM;
              ...
      - patterns:
          - pattern: path.join(..., $ALIAS, ...)
          - pattern-inside: |
              $ALIAS = $REQ.query.$PARAM;
              ...
      - patterns:
          - pattern: path.join(..., $ALIAS, ...)
          - pattern-inside: |
              $ALIAS = $REQ.body.$PARAM;
              ...
      # Aliased via destructuring: const { x } = req.params; path.join(base, x)
      # semgrep binds the destructuring keyword literally, so const/let/var are
      # enumerated (an ellipsis does not generalize the declaration keyword).
      - patterns:
          - pattern: path.join(..., $ALIAS, ...)
          - pattern-either:
              - pattern-inside: |
                  const { ..., $ALIAS, ... } = $REQ.params;
                  ...
              - pattern-inside: |
                  let { ..., $ALIAS, ... } = $REQ.params;
                  ...
              - pattern-inside: |
                  var { ..., $ALIAS, ... } = $REQ.params;
                  ...
      - patterns:
          - pattern: path.join(..., $ALIAS, ...)
          - pattern-either:
              - pattern-inside: |
                  const { ..., $ALIAS, ... } = $REQ.query;
                  ...
              - pattern-inside: |
                  let { ..., $ALIAS, ... } = $REQ.query;
                  ...
              - pattern-inside: |
                  var { ..., $ALIAS, ... } = $REQ.query;
                  ...
      - patterns:
          - pattern: path.join(..., $ALIAS, ...)
          - pattern-either:
              - pattern-inside: |
                  const { ..., $ALIAS, ... } = $REQ.body;
                  ...
              - pattern-inside: |
                  let { ..., $ALIAS, ... } = $REQ.body;
                  ...
              - pattern-inside: |
                  var { ..., $ALIAS, ... } = $REQ.body;
                  ...
    metadata:
      category: security
      cwe: 'CWE-22'

  - id: path-traversal-resolve
    message: |
      path.resolve() with user input may escape intended directory. Use
      path.join() and verify result with startsWith().
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern: path.resolve($USER_INPUT)
    metadata:
      category: security
      cwe: 'CWE-22'

  # ---------------------------------------------------------------------------
  # HARDCODED SECRETS
  # ---------------------------------------------------------------------------
  - id: hardcoded-jwt-secret
    message: |
      JWT secret appears to be hardcoded. Use environment variables for secrets.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: jwt.sign($PAYLOAD, "...")
      - pattern: jwt.verify($TOKEN, "...")
    metadata:
      category: security
      cwe: 'CWE-798'

  - id: hardcoded-api-key
    message: |
      API key appears to be hardcoded. Use environment variables for secrets.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: |
          { ..., apiKey: "...", ... }
      - pattern: |
          headers: { ..., "x-api-key": "...", ... }
    metadata:
      category: security
      cwe: 'CWE-798'

  # ---------------------------------------------------------------------------
  # UNSAFE DESERIALIZATION
  # ---------------------------------------------------------------------------
  - id: unsafe-eval
    message: |
      eval() with dynamic input is dangerous. Use safer alternatives.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: eval($USER_INPUT)
      - pattern: new Function($USER_INPUT)
    metadata:
      category: security
      cwe: 'CWE-95'

  # ---------------------------------------------------------------------------
  # MISSING SECURITY HEADERS
  # ---------------------------------------------------------------------------
  - id: cors-allow-all
    message: |
      CORS configured to allow all origins. This may expose APIs to
      unauthorized cross-origin requests.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: |
          cors({ origin: "*" })
      - pattern: |
          cors({ origin: true })
      - pattern: |
          res.setHeader("Access-Control-Allow-Origin", "*")
    metadata:
      category: security
      cwe: 'CWE-942'

  # ---------------------------------------------------------------------------
  # DENIAL OF SERVICE
  # ---------------------------------------------------------------------------
  - id: unbounded-array-growth
    message: |
      Array grows unboundedly in loop. Add size limits to prevent memory
      exhaustion.
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern: |
      while (...) {
        ...
        $ARR.push(...)
        ...
      }
    metadata:
      category: security
      cwe: 'CWE-400'

  # ---------------------------------------------------------------------------
  # REACT SECURITY
  # ---------------------------------------------------------------------------
  - id: react-dangerous-html
    message: |
      dangerouslySetInnerHTML with user input can lead to XSS. Sanitize HTML
      with DOMPurify or similar library.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-regex: "dangerouslySetInnerHTML\\s*=\\s*\\{\\{\\s*__html"
    metadata:
      category: security
      cwe: 'CWE-79'
      owasp: 'A07:2021'

  - id: react-href-javascript
    message: |
      javascript: URLs in href can lead to XSS. Validate URLs or use
      onClick handlers instead.
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern-either:
      - pattern: <a href={`javascript:${$CODE}`} />
      - pattern: <a href="javascript:..." />
    metadata:
      category: security
      cwe: 'CWE-79'
