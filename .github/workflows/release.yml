name: Release

on:
  push:
    tags: ['v*']

permissions:
  id-token: write # Required for OIDC trusted publishing to npm
  contents: write # Required for creating GitHub releases

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5. We pin to 11.5.2 (the
      # first OIDC-stable release) instead of `npm@latest` to avoid the
      # MODULE_NOT_FOUND (promise-retry) regression hit when self-upgrading
      # over the setup-node-provided npm on top of the newest 11.x.
      - name: Pin npm for OIDC trusted publishing
        run: npm install -g npm@11.5.2

      - name: Install dependencies
        run: npm ci --no-audit
        env:
          CI: 'true'

      - name: Run pre-release checks
        run: npm run prerelease
        env:
          CI: 'true'

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.

            ## Installation
            ```bash
            npx create-qa-architect@latest
            ```

            ## Update existing projects
            ```bash
            npx create-qa-architect@latest --update
            ```
          draft: false
          prerelease: false
