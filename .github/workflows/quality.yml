name: Quality Checks

# Industry best practice: "Fail fast locally, verify comprehensively remotely"
#
# Local (pre-commit): Lint + format (staged files) - instant feedback
# Local (pre-push): Type check + tests (changed files) - catches logic bugs
# CI (this workflow): Full test suite + E2E + security - comprehensive verification
#
# Note: Lint/format NOT duplicated here - pre-commit already did it
# This avoids redundant work and reduces CI costs

on:
  push: # Kept: catches direct pushes and scheduled scans
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  schedule:
    - cron: '0 0 1 * *' # Monthly on 1st (security scans)
  workflow_dispatch: # Manual trigger

# Prevent duplicate runs - cancel in-progress when new commit pushed
concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# WORKFLOW_MODE: minimal

jobs:
  # Step 1: Detect project maturity level and package manager
  # Skip for Dependabot PRs - they auto-merge based on their own checks
  # This reduces GitHub Actions minutes by ~50% on active repos
  detect-maturity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'dependabot[bot]' || github.event_name == 'schedule'
    outputs:
      maturity: ${{ steps.detect.outputs.maturity }}
      source-count: ${{ steps.detect.outputs.source-count }}
      test-count: ${{ steps.detect.outputs.test-count }}
      has-deps: ${{ steps.detect.outputs.has-deps }}
      has-docs: ${{ steps.detect.outputs.has-docs }}
      has-css: ${{ steps.detect.outputs.has-css }}
      package-manager: ${{ steps.detect-pm.outputs.manager }}
      install-cmd: ${{ steps.detect-pm.outputs.install-cmd }}
      is-turborepo: ${{ steps.detect-pm.outputs.is-turborepo }}
      turbo-prefix: ${{ steps.detect-pm.outputs.turbo-prefix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Detect Package Manager
        id: detect-pm
        run: |
          # Detect package manager from lockfiles
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "install-cmd=pnpm install --frozen-lockfile" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "install-cmd=yarn install --frozen-lockfile" >> $GITHUB_OUTPUT
          elif [ -f bun.lockb ]; then
            echo "manager=bun" >> $GITHUB_OUTPUT
            echo "install-cmd=bun install --frozen-lockfile" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "install-cmd=npm ci" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "install-cmd=npm install" >> $GITHUB_OUTPUT
          fi

          # Detect Turborepo
          if [ -f turbo.json ]; then
            echo "is-turborepo=true" >> $GITHUB_OUTPUT
            echo "turbo-prefix=turbo run" >> $GITHUB_OUTPUT
            echo "📦 Turborepo detected - will use 'turbo run' for tasks"
          else
            echo "is-turborepo=false" >> $GITHUB_OUTPUT
            echo "turbo-prefix=" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.detect-pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Setup Bun
        if: steps.detect-pm.outputs.manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.0'

      # {{FULL_DETECTION_BEGIN}}
      - name: Detect Project Maturity
        id: detect
        run: |
          # Use the project maturity detector (local for qa-architect itself, npx for consumer projects)
          if [ -f lib/project-maturity.js ]; then
            node lib/project-maturity.js --github-actions >> $GITHUB_OUTPUT
          else
            npx create-qa-architect@latest --check-maturity --github-actions >> $GITHUB_OUTPUT
          fi
      # {{FULL_DETECTION_END}}
      # {{FULL_REPORT_BEGIN}}
      - name: Display Detection Report
        run: |
          echo "📊 Project Detection Results"
          echo "Package Manager: ${{ steps.detect-pm.outputs.manager }}"
          echo "Install Command: ${{ steps.detect-pm.outputs.install-cmd }}"
          echo "Turborepo: ${{ steps.detect-pm.outputs.is-turborepo }}"
          echo "Maturity: ${{ steps.detect.outputs.maturity }}"
          echo "Source files: ${{ steps.detect.outputs.source-count }}"
          echo "Test files: ${{ steps.detect.outputs.test-count }}"
          echo "Has dependencies: ${{ steps.detect.outputs.has-deps }}"
          echo "Has documentation: ${{ steps.detect.outputs.has-docs }}"
          echo "Has CSS files: ${{ steps.detect.outputs.has-css }}"
      # {{FULL_REPORT_END}}

  # Note: Lint/format jobs REMOVED - pre-commit already does this locally
  # This follows industry best practice: "Each layer does unique work"
  # Pre-commit = lint + format on staged files
  # CI = full tests + E2E + security (things that can't be done locally)

  # Step 2: Security checks - run if dependencies exist
  #
  # Optional Enhanced Token Configuration:
  # - GITLEAKS_TOKEN: Enhanced GitHub token for gitleaks (fallback: GITHUB_TOKEN)
  # - GITLEAKS_LICENSE: Commercial gitleaks license key for advanced features
  # - SEMGREP_APP_TOKEN: Semgrep app token for enhanced scanning and rate limits
  #
  # These are optional - workflow functions with defaults but enhanced tokens
  # provide better reliability on GHES/self-hosted and unlock premium features
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-maturity
    # Least privilege: this job only needs to read the code and post a PR
    # comment. Scoping the token here means a compromised scan dependency
    # cannot push commits, alter releases, or touch other repo resources.
    permissions:
      contents: read
      pull-requests: write
    # Security MUST run at PR time, not only monthly — "CI green" has to mean
    # "secret-scanned + SAST-clean". Runs on PRs, direct pushes, the monthly
    # scheduled deep scan, and manual dispatch.
    if: >-
      (github.event_name == 'pull_request' || github.event_name == 'push' ||
       github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      needs.detect-maturity.outputs.has-deps == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: ${{ needs.detect-maturity.outputs.package-manager }}

      - name: Setup pnpm
        if: needs.detect-maturity.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Setup Bun
        if: needs.detect-maturity.outputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.0'

      - name: Install dependencies
        run: ${{ needs.detect-maturity.outputs.install-cmd }}

      - name: Verify dependency integrity
        run: |
          echo "🔐 Verifying dependency integrity..."
          PACKAGE_MANAGER="${{ needs.detect-maturity.outputs.package-manager }}"

          case "$PACKAGE_MANAGER" in
            "pnpm")
              if [ -f pnpm-lock.yaml ]; then
                pnpm install --frozen-lockfile --dry-run
                echo "✅ Dependency integrity verified (pnpm)"
              else
                echo "⚠️ No pnpm-lock.yaml found - skipping integrity verification"
              fi
              ;;
            "yarn")
              if [ -f yarn.lock ]; then
                yarn install --frozen-lockfile --dry-run
                echo "✅ Dependency integrity verified (yarn)"
              else
                echo "⚠️ No yarn.lock found - skipping integrity verification"
              fi
              ;;
            "bun")
              if [ -f bun.lockb ]; then
                bun install --frozen-lockfile --dry-run
                echo "✅ Dependency integrity verified (bun)"
              else
                echo "⚠️ No bun.lockb found - skipping integrity verification"
              fi
              ;;
            "npm"|*)
              if [ -f package-lock.json ]; then
                npm ci --dry-run --prefer-offline
                echo "✅ Dependency integrity verified (npm)"
              else
                echo "⚠️ No package-lock.json found - skipping integrity verification"
              fi
              ;;
          esac

      # ONE blocking dependency-CVE gate. Prod deps only: this tool ships via npx,
      # so production deps are what consumers download — that's the real "CI green
      # = clean" line. Dev-tooling CVEs don't reach users and are surfaced
      # (non-blocking) by the audit-report job instead. (Replaces the previous
      # three cascading audits — moderate-all, high-all, high-prod.)
      - name: Production dependency CVE gate
        run: |
          PACKAGE_MANAGER="${{ needs.detect-maturity.outputs.package-manager }}"
          echo "🔒 Auditing production dependencies (high+) with $PACKAGE_MANAGER..."
          case "$PACKAGE_MANAGER" in
            "pnpm") pnpm audit --audit-level high --prod ;;
            "yarn") yarn audit --level high --groups dependencies ;;
            "bun") bun audit --audit-level high --production ;;
            "npm"|*) npm audit --audit-level high --omit=dev ;;
          esac

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Running gitleaks secret scanning..."
          # Use setup.js security scan which manages gitleaks binary internally
          # This avoids the commercial license requirement of the gitleaks-action
          if [ -f setup.js ]; then
            node setup.js --security-config
          else
            npx --yes create-qa-architect@latest --security-config
          fi

      - name: Security pattern detection
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >
            p/security-audit@1.85.0
            p/javascript@1.85.0
          cache: true
          cache-key: semgrep-security-audit-1.85.0-javascript-1.85.0-${{ env.SEMGREP_VERSION }}
        env:
          # Use Semgrep app token ONLY if a real one is configured. Do NOT fall
          # back to GITHUB_TOKEN: any non-empty SEMGREP_APP_TOKEN puts the action
          # into "logged in" mode (`semgrep ci`), which refuses the `--config`
          # rules below ("Cannot run semgrep ci with --config while logged in").
          # Leaving it empty runs the registry config rules locally — exactly
          # what we want for PR-time SAST without uploading findings to the app.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMGREP_VERSION: '1.85.0'
          SEMGREP_ENABLE_VERSION_CHECK: 'false'

  # Step 2b: Advisory audit report (NON-BLOCKING). Runs in parallel with the
  # security gate (needs detect-maturity, NOT security) so a gate failure can
  # never suppress this report. Surfaces qa-architect's own vibe-code audit (the
  # AI-native rules generic SAST misses) plus a full-dep-tree advisory audit, and
  # posts them as a sticky PR comment. PR-only: the comment is meaningless on
  # push/schedule, so this adds no cost to those runs.
  audit-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-maturity
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request' && needs.detect-maturity.outputs.has-deps == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: ${{ needs.detect-maturity.outputs.package-manager }}

      - name: Setup pnpm
        if: needs.detect-maturity.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Setup Bun
        if: needs.detect-maturity.outputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.0'

      - name: Install dependencies
        run: ${{ needs.detect-maturity.outputs.install-cmd }}

      - name: Advisory full-tree dependency audit (non-blocking)
        run: |
          PACKAGE_MANAGER="${{ needs.detect-maturity.outputs.package-manager }}"
          echo "ℹ️ Advisory audit — all deps incl. dev tooling (does not block)" >> "$GITHUB_STEP_SUMMARY"
          case "$PACKAGE_MANAGER" in
            "pnpm") pnpm audit --audit-level=moderate >> "$GITHUB_STEP_SUMMARY" 2>&1 || true ;;
            "yarn") yarn audit --level=moderate >> "$GITHUB_STEP_SUMMARY" 2>&1 || true ;;
            "bun") bun audit --audit-level=moderate >> "$GITHUB_STEP_SUMMARY" 2>&1 || true ;;
            "npm"|*) npm audit --audit-level=moderate >> "$GITHUB_STEP_SUMMARY" 2>&1 || true ;;
          esac

      - name: Install semgrep CLI for vibe-audit
        # Install semgrep, then resolve where the binary actually landed and put
        # THAT dir on $GITHUB_PATH for the next step. pipx's bin dir varies by
        # runner (ubuntu-latest preconfigures PIPX_BIN_DIR=/opt/pipx_bin, not
        # ~/.local/bin), so we don't guess — we ask pipx for its bin dir and
        # verify `semgrep --version` resolves before continuing. Falls back to
        # `pip install --user` (~/.local/bin) if pipx is unavailable.
        run: |
          set -e
          if command -v pipx >/dev/null 2>&1; then
            pipx install semgrep==1.85.0
            BIN_DIR="$(pipx environment --value PIPX_BIN_DIR 2>/dev/null || echo "$HOME/.local/bin")"
          else
            pip install --user semgrep==1.85.0
            BIN_DIR="$(python3 -m site --user-base)/bin"
          fi
          echo "Resolved semgrep bin dir: $BIN_DIR"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          # Verify it's actually runnable from that dir (fail loudly if not).
          "$BIN_DIR/semgrep" --version

      - name: QA Architect vibe-code audit
        run: |
          echo "🔍 Running QA Architect vibe-code security audit..."
          if [ -f setup.js ]; then
            node setup.js --audit --out qa-audit-report.md --no-fail
          else
            npx --yes create-qa-architect@latest --audit --out qa-audit-report.md --no-fail
          fi

      - name: Post audit report as PR comment
        if: always() && hashFiles('qa-audit-report.md') != ''
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2.9.0
        with:
          header: qa-architect-audit
          path: qa-audit-report.md

  # Step 3: Tests - run if test files exist (development+)
  # Smart skip: Draft PRs skip tests (saves CI costs during WIP)
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-maturity
    if: |
      fromJSON(needs.detect-maturity.outputs.test-count) > 0 &&
      (github.event.pull_request.draft != true || github.event_name != 'pull_request')
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ needs.detect-maturity.outputs.package-manager }}

      - name: Setup pnpm
        if: needs.detect-maturity.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Setup Bun
        if: needs.detect-maturity.outputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.0'

      - name: Install dependencies
        run: |
          echo "⏱️ Performance Budget: Dependency installation must complete within 2 minutes"
          timeout 120 ${{ needs.detect-maturity.outputs.install-cmd }} || {
            echo "::error::Dependency installation exceeded 2-minute performance budget!"
            exit 1
          }

      # {{QA_ARCHITECT_ONLY_BEGIN}}
      # Install the semgrep CLI so tests/semgrep-rule-precision.test.js actually
      # runs (it spawns `semgrep` and SKIPS when the binary is absent — a
      # skipped precision test gives false confidence that the audit rules
      # still distinguish real vulns from benign code). Linux-only; on other
      # runners the test skips by design.
      - name: Install semgrep CLI (for rule-precision tests)
        if: runner.os == 'Linux'
        run: |
          python3 -m pip install --quiet --user semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # {{QA_ARCHITECT_ONLY_END}}
      - name: Run tests
        run: |
          echo "🧪 Running ${{ needs.detect-maturity.outputs.test-count }} test files on Node.js ${{ matrix.node-version }}..."

          # Warn if test count is suspiciously low
          TEST_COUNT=${{ needs.detect-maturity.outputs.test-count }}
          if [ "$TEST_COUNT" -lt 5 ]; then
            echo "::warning::Only $TEST_COUNT test file(s) found - consider adding more tests for better coverage"
          fi

          # Performance budget: Test suite timeout (5 minutes max)
          echo "⏱️ Performance Budget: Test suite must complete within 5 minutes"
          timeout 300 npm test || {
            echo "::error::Test suite exceeded 5-minute performance budget!"
            exit 1
          }

      # {{QA_ARCHITECT_ONLY_BEGIN}}
      - name: Cache gitleaks binary for real download test
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/create-qa-architect/gitleaks
          key: gitleaks-8.28.0-linux-x64-a65b5253-${{ hashFiles('lib/validation/config-security.js') }}
          restore-keys: |
            gitleaks-8.28.0-linux-x64-a65b5253-
            gitleaks-8.28.0-linux-x64-

      - name: Run real gitleaks binary verification test
        if: runner.os == 'Linux' && hashFiles('tests/gitleaks-real-binary-test.js') != ''
        run: |
          echo "🔐 Running real gitleaks binary verification test..."
          QAA_DEVELOPER=true RUN_REAL_BINARY_TEST=1 node tests/gitleaks-real-binary-test.js
      # {{QA_ARCHITECT_ONLY_END}}

  # Step 4: Documentation - run for production-ready projects
  documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-maturity
    if: needs.detect-maturity.outputs.maturity == 'production-ready'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: ${{ needs.detect-maturity.outputs.package-manager }}

      - name: Setup pnpm
        if: needs.detect-maturity.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Setup Bun
        if: needs.detect-maturity.outputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.0'

      - name: Install dependencies
        run: ${{ needs.detect-maturity.outputs.install-cmd }}

      # (Secret scanning lives in the `security` gate job, which runs on every
      # PR/push. It was duplicated here previously — removed to avoid running
      # gitleaks twice per workflow.)

      - name: Documentation validation
        run: |
          echo "📖 Running documentation validation..."
          if [ -f setup.js ]; then
            node setup.js --validate-docs
          else
            npx create-qa-architect@latest --validate-docs
          fi

      - name: Documentation consistency and security audit freshness
        continue-on-error: true
        run: |
          echo "🔐 Running comprehensive documentation validation..."
          # This includes security audit freshness check with proper git-based validation
          if [ -f scripts/check-docs.sh ]; then
            bash scripts/check-docs.sh
          else
            echo "No check-docs.sh found - skipping documentation consistency check"
          fi

      - name: Package size and contents validation
        if: hashFiles('package.json') != ''
        run: |
          echo "📦 Validating package size and contents..."

          # Check if this is an npm package
          if [ -f package.json ] && grep -q '"name"' package.json; then
            # Dry-run pack to check what would be included
            echo "🔍 Checking package contents (dry run):"
            npm pack --dry-run 2>/dev/null | grep -E '^[a-zA-Z]' || echo "No files listed"

            # Calculate estimated pack size
            PACK_SIZE=$(npm pack --dry-run 2>&1 | grep -E 'package size.*[0-9]+' | grep -oE '[0-9.]+\s?(B|kB|MB)' | head -1 || echo "unknown")
            echo "📊 Estimated package size: $PACK_SIZE"

            # Warn if package seems too large (>10MB)
            if echo "$PACK_SIZE" | grep -qE '[0-9]+\s?MB'; then
              SIZE_NUM=$(echo "$PACK_SIZE" | grep -oE '[0-9]+')
              if [ "$SIZE_NUM" -gt 10 ]; then
                echo "::warning::Package size ($PACK_SIZE) is quite large. Consider excluding unnecessary files via .npmignore or package.json 'files' field."
              fi
            fi

            # Check for common files that shouldn't be in packages
            echo "🔍 Checking for potentially unwanted files..."
            npm pack --dry-run 2>/dev/null | grep -E '\.(log|tmp|cache|DS_Store)$|node_modules/|\.git/' && {
              echo "::warning::Package contains files that might not belong in the published package"
            } || echo "✅ No obviously unwanted files detected"

            # Validate package.json files field if present
            if grep -q '"files"' package.json; then
              echo "✅ Package.json 'files' field configured"
            else
              echo "::notice::No 'files' field in package.json - all files except those in .npmignore will be included"
            fi
          else
            echo "ℹ️ Not an npm package or no package.json found - skipping package validation"
          fi

      - name: Detect web app
        id: detect-webapp
        run: |
          # Only run Lighthouse for actual web apps, not CLI tools
          IS_WEBAPP=false

          # Check for web app indicators
          if [ -f "index.html" ] || [ -f "public/index.html" ] || [ -f "src/index.html" ]; then
            IS_WEBAPP=true
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            IS_WEBAPP=true
          elif grep -q '"start".*"next\|vite\|react-scripts\|serve"' package.json 2>/dev/null; then
            IS_WEBAPP=true
          fi

          echo "is-webapp=$IS_WEBAPP" >> $GITHUB_OUTPUT
          echo "Web app detected: $IS_WEBAPP"

      - name: Lighthouse CI
        if: hashFiles('.lighthouserc.js', '.lighthouserc.json', 'lighthouserc.js') != '' && steps.detect-webapp.outputs.is-webapp == 'true'
        id: lighthouse
        run: |
          echo "Running Lighthouse CI..."
          npx lhci autorun
        continue-on-error: true

      - name: Report Lighthouse Failures
        if: steps.lighthouse.outcome == 'failure'
        run: |
          echo "::warning::Lighthouse CI failed - performance budgets or quality thresholds violated"
          echo "Review the Lighthouse report to see which metrics failed."
          echo "Common failures: performance score, accessibility issues, SEO problems"

          # Add to job summary for visibility
          echo "## Lighthouse CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "Performance budgets or quality thresholds were violated." >> $GITHUB_STEP_SUMMARY
          echo "Review the Lighthouse report in the Actions logs above." >> $GITHUB_STEP_SUMMARY

          # Soft warning, not hard fail - Lighthouse issues shouldn't block releases
          # Teams can enforce by adding 'error' level assertions in their lighthouserc
          echo "::notice::Lighthouse failures are warnings. Add 'error' assertions in .lighthouserc.js to enforce."

  # Step 5: Summary - report what checks ran
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect-maturity
      - security
      - audit-report
      - tests
      - documentation
    if: always()

    steps:
      - name: Generate Check Summary
        env:
          SECURITY_RESULT: ${{ needs.security.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          DOCS_RESULT: ${{ needs.documentation.result }}
        run: |
          echo "## Quality Checks Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Maturity Level:** ${{ needs.detect-maturity.outputs.maturity }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Project Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Source files: ${{ needs.detect-maturity.outputs.source-count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test files: ${{ needs.detect-maturity.outputs.test-count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Has dependencies: ${{ needs.detect-maturity.outputs.has-deps }}" >> $GITHUB_STEP_SUMMARY
          echo "- Has documentation: ${{ needs.detect-maturity.outputs.has-docs }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: Lint/format checks run locally in pre-commit (not duplicated here)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Security
          if [ "$SECURITY_RESULT" == "success" ]; then
            echo "- ✅ Security: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "$SECURITY_RESULT" == "failure" ]; then
            echo "- ❌ Security: Failed" >> $GITHUB_STEP_SUMMARY
          elif [ "$SECURITY_RESULT" == "skipped" ]; then
            echo "- ⏭️ Security: Skipped (runs on schedule/manual trigger)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Security: $SECURITY_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

          # Tests
          if [ "$TESTS_RESULT" == "success" ]; then
            echo "- ✅ Tests: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "$TESTS_RESULT" == "failure" ]; then
            echo "- ❌ Tests: Failed" >> $GITHUB_STEP_SUMMARY
          elif [ "$TESTS_RESULT" == "skipped" ]; then
